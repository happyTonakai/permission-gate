name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# golangci-lint v2 自带 cache step；保留 concurrency 让重复 push 取消上一次跑。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false  # golangci-lint-action 自带 internal cache

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # 与本地一致：v2.12（详见 .golangci.yaml version 字段）
          version: v2.12.2
          args: --config .golangci.yaml ./...